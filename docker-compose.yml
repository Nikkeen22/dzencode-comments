services:
  db:
    image: postgres:17-alpine
    container_name: dzencode_postgres_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=dzencode_comments
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=super_secret_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dzencode_comments"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dzencode_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: dzencode_django_app
    command: >
      sh -c "python manage.py migrate &&
             daphne -b 0.0.0.0 -p 8000 core.asgi:application"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - 'SECRET_KEY=django-insecure-$$xt+=unsr-@td#qb6$$bykr2h*#d-0v$$#4#d#skw627c*93x1x='
      - DEBUG=True
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0
      - DB_HOST=db
      - DB_NAME=dzencode_comments
      - DB_USER=postgres
      - DB_PASSWORD=super_secret_password
      - DB_PORT=5432
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build: .
    container_name: dzencode_celery_worker
    command: celery -A core worker --loglevel=info
    volumes:
      - .:/app
    environment:
      - 'SECRET_KEY=django-insecure-$$xt+=unsr-@td#qb6$$bykr2h*#d-0v$$#4#d#skw627c*93x1x='
      - DEBUG=True
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0
      - DB_HOST=db
      - DB_NAME=dzencode_comments
      - DB_USER=postgres
      - DB_PASSWORD=super_secret_password
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: dzencode_vue_app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - web

volumes:
  postgres_data: